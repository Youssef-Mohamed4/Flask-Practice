{% extends "base.html" %}

{% block body %}
<div class="card">
    <div class="card-header text-center">
        <h2>{{title}}</h2>
    </div>
    <div class="card-body">
        <ul class="list-group">
            {% for task in tasks %}
            <li class="list-group-item d-flex justify-content-between align-items-center">
                {{ task.title }}
                {% if task.completed %}
                <span class="badge bg-success">Completed</span>
                {% else %}
                    <span class="badge bg-success">Not Completed</span>
                {% endif %}
            </li>
            {% endfor %}
        </ul>
    </div>
</div>
{% endblock %}
