{% extends "base.html"%}

{%block body%}

<div class='card'>
    <div class='card-header text-center'>
        <h2>{{title}}</h2>
    </div>
    <div class='card-body'>
        <form action="" method="POST">
            {{ form.hidden_tag() }}

           
            {{form.email.label}}
            {{form.email(class='form-control')}}


            {{form.password.label}}
            {{form.password(class='form-control')}}

            {{form.remember_me}}
            {{form.remember_me.label}}
            <br>
            {{form.btn(class='btn btn-primary')}}
        </form>
    </div>
</div>

{%endblock%}
